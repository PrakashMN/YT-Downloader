<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Downloader</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <i class="fab fa-youtube"></i>
        </div>
        <div class="logo-text">
          <h1>YT<span>Downloader</span></h1>
          <p>Fast & Free YouTube Video Downloader</p>
        </div>
      </div>
    </header>

    <!-- Search Card -->
    <div class="card search-card">
      <div class="card-inner">
        <h2 class="section-title">
          <i class="fas fa-link"></i> Paste YouTube URL
        </h2>
        <div class="input-group">
          <div class="input-wrapper">
            <i class="fab fa-youtube input-icon"></i>
            <input
              type="text"
              id="urlInput"
              placeholder="https://www.youtube.com/watch?v=..."
              autocomplete="off"
              spellcheck="false"
            />
            <button class="clear-btn" id="clearBtn" title="Clear">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <button class="fetch-btn" id="fetchBtn">
            <span class="btn-text"><i class="fas fa-search"></i> Fetch Video</span>
            <span class="btn-loader hidden"><i class="fas fa-spinner fa-spin"></i> Fetching...</span>
          </button>
        </div>
        <div class="error-msg hidden" id="errorMsg">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorText"></span>
        </div>
      </div>
    </div>

    <!-- Video Info Card -->
    <div class="card video-card hidden" id="videoCard">
      <div class="card-inner">
        <div class="video-info">
          <div class="thumbnail-wrapper">
            <img id="thumbnail" src="" alt="Thumbnail" />
            <div class="duration-badge" id="duration"></div>
            <div class="play-overlay">
              <i class="fas fa-play"></i>
            </div>
          </div>
          <div class="video-meta">
            <h3 id="videoTitle" class="video-title"></h3>
            <div class="meta-row">
              <span class="meta-item">
                <i class="fas fa-user-circle"></i>
                <span id="videoAuthor"></span>
              </span>
              <span class="meta-item">
                <i class="fas fa-eye"></i>
                <span id="videoViews"></span> views
              </span>
            </div>
          </div>
        </div>

        <div class="formats-section">
          <h3 class="section-title">
            <i class="fas fa-download"></i> Choose Format & Quality
          </h3>
          <div class="formats-grid" id="formatsGrid"></div>
        </div>
      </div>
    </div>

    <!-- Progress Card -->
    <div class="card progress-card hidden" id="progressCard">
      <div class="card-inner">
        <div class="progress-info">
          <i class="fas fa-bolt progress-icon"></i>
          <div>
            <p class="progress-label">Downloading your video...</p>
            <p class="progress-sub">Please wait, this may take a moment</p>
          </div>
        </div>
        <div class="progress-bar-wrapper">
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Made with <i class="fas fa-heart"></i> for personal use only &bull; Respect copyright laws</p>
    </footer>

  </div>

  <img class="trademark-logo" src="pmn-logo.png" alt="PMN Trademark Logo" />

  <script src="script.js"></script>
</body>
</html>
